name: Debug PostgreSQL Resources

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Check all namespaces for PostgreSQL
      run: |
        echo "=== All namespaces ==="
        kubectl get namespaces
        
        echo -e "\n=== PostgreSQL resources in all namespaces ==="
        kubectl get statefulset --all-namespaces | grep postgresql || echo "No postgresql statefulsets found"
        kubectl get service --all-namespaces | grep postgresql || echo "No postgresql services found"
        
        echo -e "\n=== Resources in peerbot namespace ==="
        kubectl get all -n peerbot || echo "Namespace doesn't exist or no resources"
        
        echo -e "\n=== Describe PostgreSQL StatefulSet ==="
        kubectl describe statefulset peerbot-postgresql -n peerbot || echo "StatefulSet not found"
        
        echo -e "\n=== Check labels on PostgreSQL resources ==="
        kubectl get statefulset peerbot-postgresql -n peerbot -o yaml | grep -A 10 "labels:" || echo "No labels found"
        
        echo -e "\n=== Check Helm releases ==="
        helm list --all-namespaces | grep peerbot || echo "No peerbot releases found"