name: Fix Deployment

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    environment: community
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup kubeconfig
      run: |
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > /tmp/kubeconfig
        chmod 600 /tmp/kubeconfig
        echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV
        
    - name: Install Helm
      uses: azure/setup-helm@v3
      with:
        version: 'v3.12.0'
        
    - name: Fix deployment by disabling PostgreSQL in Helm
      run: |
        # Update the existing release without PostgreSQL
        helm upgrade peerbot charts/peerbot \
          --namespace peerbot \
          --reuse-values \
          --set postgresql.enabled=false \
          --set dispatcher.image.tag=latest \
          --set orchestrator.image.tag=latest \
          --set worker.image.tag=latest \
          --wait \
          --timeout 5m
          
    - name: Check deployment status
      run: |
        echo "=== Pods ==="
        kubectl get pods -n peerbot
        
        echo -e "\n=== Orchestrator Logs ==="
        kubectl logs -n peerbot deployment/peerbot-orchestrator --tail=20 || echo "Not ready yet"