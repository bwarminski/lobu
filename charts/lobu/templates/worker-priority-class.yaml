apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  # Cluster-scoped resource: must be unique across all Helm releases.
  name: {{ include "lobu.fullname" . }}-worker-priority
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
value: 100
globalDefault: false
description: "Priority class for Claude worker pods to use dedicated resource quota"
