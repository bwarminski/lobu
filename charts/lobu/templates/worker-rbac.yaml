apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (printf "%s-worker" (include "lobu.fullname" .)) .Values.worker.serviceAccountName }}
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
{{- if .Values.worker.imagePullSecrets }}
imagePullSecrets:
  {{- range .Values.worker.imagePullSecrets }}
  - name: {{ . | quote }}
  {{- end }}
{{- else if .Values.global.imagePullSecrets }}
imagePullSecrets:
  {{- range .Values.global.imagePullSecrets }}
  - name: {{ if kindIs "map" . }}{{ .name | quote }}{{ else }}{{ . | quote }}{{ end }}
  {{- end }}
{{- end }}

---
# SECURITY: Use namespace-scoped Role instead of ClusterRole
# Workers should ONLY have permissions within the lobu namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "lobu.fullname" . }}-worker
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
rules:
# Minimal permissions for worker pods (read-only)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# Read-only access to configmaps (no secrets access for workers)
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
# Self-cleanup: workers can delete their own deployment/PVC on shutdown
# Note: This is namespace-scoped, so workers cannot affect other namespaces
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "delete"]
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "lobu.fullname" . }}-worker
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "lobu.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "lobu.fullname" . }}-worker
subjects:
- kind: ServiceAccount
  name: {{ default (printf "%s-worker" (include "lobu.fullname" .)) .Values.worker.serviceAccountName }}
  namespace: {{ .Values.kubernetes.namespace }}
