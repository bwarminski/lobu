{{- if and .Values.dispatcher.anthropicProxy.enabled .Values.dispatcher.anthropicProxy.internalIngress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "peerbot.fullname" . }}-dispatcher-internal
  namespace: {{ .Values.kubernetes.namespace }}
  labels:
    {{- include "peerbot.labels" . | nindent 4 }}
    app.kubernetes.io/component: dispatcher-internal
  annotations:
    # Internal only - not accessible from outside cluster
    kubernetes.io/ingress.class: "internal"
    {{- if .Values.dispatcher.anthropicProxy.internalIngress.annotations }}
    {{- toYaml .Values.dispatcher.anthropicProxy.internalIngress.annotations | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.dispatcher.anthropicProxy.internalIngress.className }}
  ingressClassName: {{ .Values.dispatcher.anthropicProxy.internalIngress.className }}
  {{- end }}
  {{- if .Values.dispatcher.anthropicProxy.internalIngress.tls }}
  tls:
    {{- range .Values.dispatcher.anthropicProxy.internalIngress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.dispatcher.anthropicProxy.internalIngress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "peerbot.fullname" $ }}-dispatcher
                port:
                  number: {{ $.Values.dispatcher.service.port }}
          {{- end }}
    {{- end }}
{{- end }}