# OVH deployment values for localhostcomputing.com
# This file is specifically configured for your domain

# Global settings
global:
  imageRegistry: ""

# Deployment mode
deploymentMode: kubernetes

# Configuration - IMPORTANT: Set the public URL here
config:
  githubOrganization: "peerbot-community"  # or your organization
  githubClientId: ""  # Add your GitHub OAuth App Client ID here
  # This is the critical setting that fixes the localhost redirect issue
  ingressUrl: "https://peerbot.localhostcomputing.com"
  sessionTimeoutMinutes: "5"

# Ingress configuration with your domain
ingress:
  enabled: true
  className: nginx  # or traefik, depending on your OVH k8s setup
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod  # for automatic SSL
    # Cloudflare proxied traffic may need these:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
  hosts:
    - host: peerbot.localhostcomputing.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: peerbot-tls
      hosts:
        - peerbot.localhostcomputing.com

# Slack configuration
slack:
  port: 3000
  socketMode: false  # Use HTTP mode for webhook-based deployment
  allowDirectMessages: true
  allowPrivateChannels: false
  enableStatusReactions: true
  enableProgressUpdates: false

# Dispatcher configuration
dispatcher:
  enabled: true
  replicaCount: 1
  image:
    repository: peerbot/dispatcher
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  config:
    nodeEnv: "production"
    logLevel: "INFO"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Orchestrator configuration  
orchestrator:
  enabled: true
  replicaCount: 1
  image:
    repository: peerbot/orchestrator
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
    targetPort: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Worker configuration
worker:
  image:
    repository: peerbot/worker
    tag: latest
    pullPolicy: IfNotPresent
  job:
    timeoutSeconds: 900
    ttlSecondsAfterFinished: 300
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  persistence:
    enabled: true
    storageClass: "csi-cinder-high-speed"  # OVH's SSD storage class
    size: 10Gi

# PostgreSQL configuration
postgresql:
  enabled: true
  database: peerbot
  username: postgres
  sslMode: "disable"
  persistence:
    enabled: true
    storageClass: "csi-cinder-high-speed"  # OVH's SSD storage class
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

# Claude configuration
claude:
  model: "claude-3-5-sonnet-20241022"
  timeoutMinutes: 15
  allowedTools: ""

# Kubernetes settings
kubernetes:
  namespace: peerbot
  createNamespace: true

# Service Account
serviceAccount:
  create: true
  annotations: {}
  name: ""

# Pod security settings
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Resource limits
limitRange:
  enabled: true

# Node selector, tolerations, and affinity
nodeSelector: {}
tolerations: []
affinity: {}